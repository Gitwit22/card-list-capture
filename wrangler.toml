name = "card-list-capture"
type = "javascript"
main = "dist/index.js"
compatibility_date = "2024-01-01"

# Build configuration
[build]
command = "npm run build"
cwd = "./"
watch_paths = ["src/**/*.{ts,tsx}"]

[build.upload]
format = "service-worker"

# Production environment
[env.production]
name = "card-list-capture-prod"
routes = [
  { pattern = "card-capture.example.com/*", zone_id = "your_zone_id" }
]
vars = { ENVIRONMENT = "production" }

[env.production.env_vars]
VITE_API_BASE_URL = "https://api.nxtlvl.app"
VITE_APP_ENV = "production"
VITE_AUTH_ENABLED = "true"
VITE_ENABLE_AI_CLASSIFICATION = "true"
VITE_ENABLE_CARD_STORAGE = "true"

# Staging environment
[env.staging]
name = "card-list-capture-staging"
routes = [
  { pattern = "staging-card.example.com/*", zone_id = "your_zone_id" }
]
vars = { ENVIRONMENT = "staging" }

[env.staging.env_vars]
VITE_API_BASE_URL = "https://staging-api.nxtlvl.app"
VITE_APP_ENV = "staging"
VITE_AUTH_ENABLED = "true"
VITE_ENABLE_AI_CLASSIFICATION = "true"
VITE_DEBUG_MODE = "false"

# Development environment
[env.development]
name = "card-list-capture-dev"
vars = { ENVIRONMENT = "development" }

[env.development.env_vars]
VITE_API_BASE_URL = "http://localhost:3000"
VITE_APP_ENV = "development"
VITE_AUTH_ENABLED = "true"
VITE_DEBUG_MODE = "true"
VITE_API_TIMEOUT_MS = "60000"

# Compatibility flags
compatibility_flags = ["nodejs_compat"]

# KV Namespace bindings (for session/cache storage)
[[kv_namespaces]]
binding = "CARD_CAPTURE_CACHE"
id = "your_kv_namespace_id"
preview_id = "your_kv_preview_id"

[[kv_namespaces]]
binding = "SESSION_STORE"
id = "your_session_kv_id"
preview_id = "your_session_preview_id"

# Durable Objects (optional, for real-time card processing)
[[durable_objects.bindings]]
name = "CARD_PROCESSOR"
class_name = "CardProcessor"
script_name = "card-list-capture"

# Analytics Engine (optional, for monitoring)
[[analytics_engine_datasets]]
dataset = "card_capture_analytics"

# Triggers
[triggers]
crons = ["0 0 * * *"]  # Daily cleanup trigger
